steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:$SHORT_SHA'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'

  # Step 3: Deploy to Cloud Run (Free Tier Optimized)
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-cloud-run'
    args:
      - 'deploy'
      - 'auth-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--set-secrets'
      - 'DATABASE_URL=db-url:latest,REDIS_ADDR=redis-url:latest,JWT_ACCESS_SECRET=jwt-access-secret:latest,JWT_REFRESH_SECRET=jwt-refresh-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest'
      - '--set-env-vars'
      - 'SERVER_PORT=8080,ENV=production,TOTP_ISSUER=AuthService,TOTP_ENCRYPTION_KEY=e90cfcd097d9116bc1a66a7ad81851db25b8556769c2ae3fa46e05fef7875edf,CORS_ALLOWED_ORIGINS=https://YOUR_DOMAIN.com'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--concurrency=50'
      - '--timeout=30'
      - '--no-allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
