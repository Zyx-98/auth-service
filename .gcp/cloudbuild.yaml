steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloud-run'
    args:
      - 'run'
      - 'deploy'
      - 'auth-service'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--set-secrets=DATABASE_URL=db-url:latest,REDIS_ADDR=redis-url:latest,JWT_ACCESS_SECRET=jwt-access-secret:latest,JWT_REFRESH_SECRET=jwt-refresh-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,ENV=production,TOTP_ISSUER=AuthService,TOTP_ENCRYPTION_KEY=e90cfcd097d9116bc1a66a7ad81851db25b8556769c2ae3fa46e05fef7875edf,CORS_ALLOWED_ORIGINS=*'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--timeout=60'
      - '--service-account=auth-service-runtime@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/auth-service/api:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
