version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: auth-service:latest
    container_name: auth-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_db?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD:
      JWT_ACCESS_SECRET: dev-access-secret-change-in-prod
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-prod
      JWT_REFRESH_EXPIRY: 168h
      GOOGLE_CLIENT_ID: your-actual-client-id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: your-actual-client-secret
      GOOGLE_REDIRECT_URL: http://localhost:8080/auth/callback/google
      TOTP_ENCRYPTION_KEY: e90cfcd097d9116bc1a66a7ad81851db25b8556769c2ae3fa46e05fef7875edf
      TOTP_ISSUER: AuthService
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: auth-web
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api
    volumes:
      - ./web:/app/web
      - /app/web/node_modules

volumes:
  postgres_data:
  redis_data:
