name: Deploy to Cloud Run

on:
  push:
    branches: [master]

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: auth-service
  GCP_REGION: us-central1
  SERVICE_NAME: auth-service

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/api:latest \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }} \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/api:latest
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/api:latest \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-secrets=DATABASE_URL=db-url:latest,REDIS_ADDR=redis-url:latest,JWT_ACCESS_SECRET=jwt-access-secret:latest,JWT_REFRESH_SECRET=jwt-refresh-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,GOOGLE_REDIRECT_URL=google-redirect-url:latest \
            --set-env-vars=GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},ENV=production,TOTP_ISSUER=AuthService,TOTP_ENCRYPTION_KEY=${{ secrets.TOTP_ENCRYPTION_KEY }},CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }},RATE_LIMIT_LOGIN=5-M,RATE_LIMIT_GLOBAL=100-M \
            --min-instances=0 \
            --max-instances=1 \
            --memory=256Mi \
            --cpu=1 \
            --concurrency=80 \
            --timeout=60 \
            --allow-unauthenticated \
            --quiet

      - name: Get Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "service_url=$URL" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.url.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Memory:** 256Mi" >> $GITHUB_STEP_SUMMARY
          echo "**Max Instances:** 1 (no auto-scaling)" >> $GITHUB_STEP_SUMMARY
          echo "**Min Instances:** 0 (scales to zero when idle)" >> $GITHUB_STEP_SUMMARY
