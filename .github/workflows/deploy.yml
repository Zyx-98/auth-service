name: Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: auth-service

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GCP project ID
        id: project
        run: echo "id=$(gcloud config get-value project)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ steps.project.outputs.id }}/${{ env.IMAGE_NAME }}/api:latest .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ steps.project.outputs.id }}/${{ env.IMAGE_NAME }}/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy auth-service \
            --image ${{ env.REGISTRY }}/${{ steps.project.outputs.id }}/${{ env.IMAGE_NAME }}/api:latest \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --set-secrets=DB_URL=db-url:latest,REDIS_ADDR=redis-addr:latest,JWT_ACCESS_SECRET=jwt-access-secret:latest,JWT_REFRESH_SECRET=jwt-refresh-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest \
            --update-env-vars=SERVER_PORT=8080,ENV=production,TOTP_ISSUER=AuthService,CORS_ALLOWED_ORIGINS=https://YOUR_DOMAIN.com \
            --min-instances 0 \
            --max-instances 5 \
            --memory 256Mi \
            --cpu 1 \
            --concurrency 80 \
            --timeout 60
