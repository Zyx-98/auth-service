<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login</title>
    <style nonce="{{ .csp_nonce }}">
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #27ae60;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Login Successful</h1>
        <div class="spinner"></div>
        <p id="message">Redirecting you back to the application...</p>
        <p class="success" id="status">✓ Authentication complete</p>
    </div>

    <script nonce="{{ .csp_nonce }}">
        const data = {
            totpRequired: Boolean("{{ .totp_required }}" === "true"),
            totpToken: String("{{ .totp_token }}"),
            accessToken: String("{{ .access_token }}"),
            refreshToken: String("{{ .refresh_token }}"),
            deviceToken: String("{{ .device_token }}"),
            expiresIn: Number("{{ .expires_in }}"),
            tokenType: String("{{ .token_type }}"),
            isNewUser: Boolean("{{ .is_new_user }}" === "true")
        };

        const titleEl = document.getElementById('title');
        const messageEl = document.getElementById('message');
        const statusEl = document.getElementById('status');

        if (data.totpRequired && data.totpToken) {
            titleEl.textContent = 'Two-Factor Authentication Required';
            messageEl.textContent = 'Redirecting you to verify your authenticator...';
            statusEl.textContent = '🔐 Enter your 2FA code';

            sessionStorage.setItem('totp_token', data.totpToken);
            sessionStorage.setItem('is_new_user', data.isNewUser);
            setTimeout(() => {
                window.location.href = '/2fa-verify';
            }, 500);
        } else {
            titleEl.textContent = 'Login Successful';
            messageEl.textContent = 'Redirecting you back to the application...';
            statusEl.textContent = '✓ Authentication complete';

            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);
        }
    </script>
</body>
</html>
